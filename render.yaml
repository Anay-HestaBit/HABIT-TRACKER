services:
  # API Server (Node.js) — deployed on Render
  # Frontend goes to Vercel separately
  - type: web
    name: habit-tracker-api
    plan: free
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_SECRET
        generateValue: true
      # Set these manually in Render dashboard after first deploy:
      - key: CLIENT_URL
        sync: false   # e.g. https://your-app.vercel.app  (NO trailing slash)
      - key: MONGODB_URI
        sync: false   # Your MongoDB Atlas connection string
      - key: REDIS_URL
        sync: false   # MUST use rediss:// (TLS) for Upstash, NOT redis://
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: FROM_NAME
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
