services:
  mongo:
    image: mongo:latest
    container_name: habit-tracker-db
    restart: always
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db

  server:
    build: ./server
    container_name: habit-tracker-server
    restart: always
    environment:
      - MONGODB_URI=mongodb://mongo:27017/habitjourney
      - JWT_SECRET=your_super_secret_jwt_key_here
      - NODE_ENV=production
      - PORT=5000
    depends_on:
      - mongo
    networks:
      - app-network

  client:
    build: ./client
    container_name: habit-tracker-client
    restart: always
    depends_on:
      - server
    networks:
      - app-network

  nginx:
    image: nginx:stable-alpine
    container_name: habit-tracker-proxy
    restart: always
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - client
      - server
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongodb_data:
