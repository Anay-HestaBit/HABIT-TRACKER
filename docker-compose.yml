services:
  mongodb:
    image: mongo:7
    container_name: habit-tracker-mongodb
    restart: always
    expose:
      - "27017"
    environment:
      - MONGO_INITDB_DATABASE=habitjourney
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network

  redis:
    image: redis:alpine
    container_name: habit-tracker-redis
    restart: always
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - app-network

  server:
    build: ./server
    container_name: habit-tracker-server
    restart: always
    # Environment variables for Docker networking.
    # Inside Docker, services talk to each other by container name — NOT localhost.
    # These override anything in server/.env for the values that differ in Docker.
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/habitjourney
      - REDIS_URL=redis://redis:6379          # Redis container in this compose network
    env_file:
      - ./server/.env                         # Still loads SMTP, JWT, Cloudinary, etc. from .env
    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - app-network

  client:
    build: ./client
    container_name: habit-tracker-client
    restart: always
    depends_on:
      - server
    networks:
      - app-network

  nginx:
    image: nginx:stable-alpine
    container_name: habit-tracker-proxy
    restart: always
    ports:
      - "8080:80"              # HTTP (redirects to HTTPS)
      - "8443:443"             # HTTPS (mkcert)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - client
      - server
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data: