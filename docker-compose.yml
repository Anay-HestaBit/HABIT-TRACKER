services:
  mongo:
    image: mongo:latest
    container_name: habit-tracker-db
    restart: always
    ports:
      - "27018:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network

  redis:
    image: redis:alpine
    container_name: habit-tracker-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - app-network

  server:
    build: ./server
    container_name: habit-tracker-server
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=5000
    env_file:
      - ./server/.env
    depends_on:
      - mongo
      - redis
    networks:
      - app-network

  client:
    build: ./client
    container_name: habit-tracker-client
    restart: always
    depends_on:
      - server
    networks:
      - app-network

  nginx:
    image: nginx:stable-alpine
    container_name: habit-tracker-proxy
    restart: always
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - client
      - server
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
